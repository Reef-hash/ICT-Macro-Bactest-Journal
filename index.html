<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Backtester PRO</title>

<style>
body{
    font-family:sans-serif;
    background:#0f172a;
    color:#fff;
    padding:15px;
}
.container{max-width:900px;margin:auto}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.big{
    font-size:20px;
    font-weight:bold;
}

/* INPUT */
input{
    padding:10px;
    border:none;
    border-radius:8px;
    margin:5px;
}

/* BUTTON */
button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin:3px;
}

.win{background:#00ff88;color:#000}
.loss{background:#ff4757;color:#fff}
.be{background:#ffa502;color:#000}

/* HEATMAP */
.heatmap{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.cell{
    aspect-ratio:1;
    border-radius:6px;
    font-size:11px;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.winCell{background:#00ff88;color:#000}
.lossCell{background:#ff4757}
.beCell{background:#ffa502;color:#000}
.empty{background:rgba(255,255,255,0.05)}

.tooltip{
    display:none;
    position:absolute;
    bottom:110%;
    background:#000;
    padding:6px;
    border-radius:5px;
    font-size:10px;
}

.cell:hover .tooltip{
    display:block;
}
</style>
</head>

<body>
<div class="container">

<h2>📊 ICT Backtester PRO</h2>

<!-- STATS -->
<div class="card grid">
<div>
Winrate<br>
<span id="winrate" class="big">0%</span>
</div>

<div>
Expectancy<br>
<span id="exp" class="big">0R</span>
</div>
</div>

<!-- INPUT -->
<div class="card">
<input id="risk" placeholder="Risk (contoh 20)">
<input id="reward" placeholder="Reward (contoh 40)">

<br><br>

<button class="win" onclick="setOutcome('win')">WIN</button>
<button class="be" onclick="setOutcome('be')">BE</button>
<button class="loss" onclick="setOutcome('loss')">LOSS</button>

<br><br>

<button onclick="addTrade()">➕ Add Trade</button>
</div>

<!-- RRR -->
<div class="card">
<h3>RRR Analysis</h3>
<div id="rrr"></div>
</div>

<!-- HEATMAP -->
<div class="card">
<h3>📅 Trade Heatmap</h3>
<div id="heatmap" class="heatmap"></div>
</div>

</div>

<script>
let trades=[]
let outcome=null

function setOutcome(o){
    outcome=o
}

function addTrade(){
    let r=parseFloat(document.getElementById("risk").value)
    let rw=parseFloat(document.getElementById("reward").value)

    if(!r || !rw || !outcome){
        alert("Isi semua data")
        return
    }

    let rr=rw/r

    let cat="1:1"
    if(rr>=1.5 && rr<2.5) cat="1:2"
    else if(rr>=2.5) cat="1:3+"

    trades.push({
        rr:rr,
        cat:cat,
        outcome:outcome,
        time:new Date()
    })

    update()
}

function update(){
    calcStats()
    calcRRR()
    drawHeatmap()
}

function calcStats(){
    let total=trades.length
    if(total===0)return

    let wins=trades.filter(t=>t.outcome==="win").length

    let winrate=(wins/total*100).toFixed(1)

    let exp=0
    trades.forEach(t=>{
        if(t.outcome==="win") exp+=t.rr
        if(t.outcome==="loss") exp-=1
    })

    exp=(exp/total).toFixed(2)

    document.getElementById("winrate").innerText=winrate+"%"
    document.getElementById("exp").innerText=exp+"R"
}

function profitability(wr, rr){
    wr = wr / 100
    let loss = 1 - wr
    let e = (wr * rr) - loss

    if(e > 0) return "✅ Profitable"
    if(e === 0) return "⚖️ Break Even"
    return "❌ Not Profitable"
}

function calcRRR(){
    let html=""

    ;["1:1","1:2","1:3+"].forEach(c=>{
        let arr=trades.filter(t=>t.cat===c)
        if(arr.length===0)return

        let wins=arr.filter(t=>t.outcome==="win").length
        let wr=(wins/arr.length*100).toFixed(1)

        let rrVal = c==="1:1" ? 1 : c==="1:2" ? 2 : 3

        html += `
        ${c} | WR ${wr}% | ${profitability(wr, rrVal)}<br>
        `
    })

    document.getElementById("rrr").innerHTML=html
}

function drawHeatmap(){
    let map={}

    trades.forEach(t=>{
        let d=t.time.toISOString().split("T")[0]
        if(!map[d]) map[d]=[]
        map[d].push(t)
    })

    let today=new Date()
    let html=""

    for(let i=34;i>=0;i--){
        let d=new Date()
        d.setDate(today.getDate()-i)

        let key=d.toISOString().split("T")[0]

        if(!map[key]){
            html+=`<div class="cell empty"></div>`
            continue
        }

        let day=map[key]

        let w=day.filter(x=>x.outcome==="win").length
        let l=day.filter(x=>x.outcome==="loss").length
        let b=day.filter(x=>x.outcome==="be").length

        let cls="beCell"
        if(w>l && w>b) cls="winCell"
        else if(l>w && l>b) cls="lossCell"

        html+=`
        <div class="cell ${cls}">
            ${day.length}
            <div class="tooltip">
                ${key}<br>
                Trades: ${day.length}<br>
                W:${w} L:${l} BE:${b}
            </div>
        </div>
        `
    }

    document.getElementById("heatmap").innerHTML=html
}

update()
</script>

</body>
</html>
